write_value:
  name: Write a value to a variable
  description: Writes a value to the ventilation system.
  
  fields:
    entry_id:
      name: Config entry ID
      description: The config entry ID of the device to write to.
      required: true
      example: "abc123"
    variable:
      name: variable
      description: The variable to write to (e.g., fanspeed, boost_mode).
      example: fanspeed
    value:
      name: value
      description: The value to set for the variable.
      example: 5
