# UI helpers required by the example dashboard.
# These are not part of the integration itself — create them manually
# in Home Assistant under Settings > Devices & Services > Helpers,
# or include this file in your configuration.yaml.

input_number:

  # Selects which "page" the remote control display shows
  # 1 = Info (temperatures), 2 = Fan speed, 3 = Boost
  ventilation_display_select:
    min: 1
    max: 3
    step: 1
    initial: 1

  # Cycles through the four temperature sensors on the info page
  ventilation_display_index:
    min: 0
    max: 3
    step: 1
    initial: 0
